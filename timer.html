<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #FAF8F5;
  --surface: #FFFFFF;
  --text:    #1A1A1A;
  --muted:   #8A8580;
  --accent:  #B89C7D;
  --amber:   #C9964A;
  --red:     #B85C5C;
  --border:  #E8E3DC;
  --shadow:  0 2px 24px rgba(0,0,0,0.06);
  --ease:    200ms ease;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 50% 30%, #FFFFFF 0%, #FAF8F5 70%);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-weight: 400;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 460px;
  margin: 0 auto;
  padding: 40px 24px 56px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ─── Header ─────────────────────────────────────────────────────────────── */
.header { display: flex; align-items: center; justify-content: space-between; }

.app-title {
  font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
  color: var(--muted); user-select: none;
}

.popout-btn {
  background: none; border: 1.5px solid var(--border); border-radius: 8px;
  color: var(--muted); padding: 5px 10px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  transition: border-color var(--ease), color var(--ease); flex-shrink: 0;
}
.popout-btn:hover { border-color: var(--accent); color: var(--accent); }
.popout-btn svg   { width: 13px; height: 13px; flex-shrink: 0; }

/* ─── Countdown ──────────────────────────────────────────────────────────── */
.hero { display: flex; flex-direction: column; align-items: center; gap: 12px; }

.countdown {
  font-family: 'Courier Prime', 'Courier New', monospace;
  font-size: clamp(56px, 14vw, 88px); font-weight: 400; letter-spacing: 0.05em;
  color: var(--text); text-shadow: 0 1px 12px rgba(184,156,125,0.25);
  transition: color var(--ease); font-variant-numeric: tabular-nums;
  user-select: none; text-align: center;
}
.countdown.amber { color: var(--amber); }
.countdown.red   { color: var(--red);   }

.duration-input {
  display: flex; align-items: center; gap: 2px;
  font-family: 'Courier Prime', monospace;
  font-size: clamp(56px, 14vw, 88px); letter-spacing: 0.03em;
}

.dur-field {
  width: 2.2ch; background: transparent; border: none;
  border-bottom: 1.5px solid transparent; text-align: center;
  font-family: inherit; font-size: inherit; color: var(--text);
  outline: none; padding: 0 1px; transition: border-color var(--ease);
  font-variant-numeric: tabular-nums; -moz-appearance: textfield;
}
.dur-field::-webkit-outer-spin-button,
.dur-field::-webkit-inner-spin-button { -webkit-appearance: none; }
.dur-field:focus { border-bottom-color: var(--accent); }

.dur-sep { color: var(--muted); line-height: 1; margin-bottom: 6px; user-select: none; }

.hint { font-size: 12px; color: var(--muted); text-align: center; min-height: 18px; }

/* Next reminder pill — shown in popup */
.next-reminder {
  font-size: 12px; color: var(--muted); background: var(--surface);
  border: 1px solid var(--border); border-radius: 50px; padding: 4px 14px;
  text-align: center; display: none;
}
.next-reminder span { color: var(--accent); font-weight: 500; }

/* ─── Controls ───────────────────────────────────────────────────────────── */
.controls { display: flex; justify-content: center; gap: 12px; }

.btn {
  padding: 9px 28px; border-radius: 50px; border: 1.5px solid var(--accent);
  background: transparent; color: var(--accent);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer;
  transition: background var(--ease), color var(--ease), transform 100ms ease, opacity var(--ease);
  letter-spacing: 0.02em;
}
.btn:hover   { background: var(--accent); color: #fff; }
.btn:active  { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; pointer-events: none; }

.btn-muted { border-color: var(--border); color: var(--muted); }
.btn-muted:hover { background: var(--border); color: var(--text); }

/* ─── Card ───────────────────────────────────────────────────────────────── */
.card {
  background: var(--surface); border-radius: 16px; box-shadow: var(--shadow);
  padding: 20px 22px; display: flex; flex-direction: column; gap: 16px;
}

.section-label {
  font-size: 11px; font-weight: 500; letter-spacing: 0.12em; color: var(--muted);
}

/* ─── Reminder rows ──────────────────────────────────────────────────────── */
#reminders { display: flex; flex-direction: column; }

.reminder-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--border); transition: opacity var(--ease);
}
.reminder-row:last-child { border-bottom: none; }
.reminder-row.invalid { opacity: 0.35; }
.reminder-row.invalid .rm-time-input { pointer-events: none; }

.rm-check {
  appearance: none; -webkit-appearance: none; width: 18px; height: 18px;
  border: 1.5px solid var(--border); border-radius: 5px; flex-shrink: 0;
  cursor: pointer; transition: background var(--ease), border-color var(--ease);
  position: relative;
}
.rm-check:checked { background: var(--accent); border-color: var(--accent); }
.rm-check:checked::after {
  content: ''; position: absolute; left: 4px; top: 1px; width: 5px; height: 10px;
  border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(40deg);
}

.rm-prefix { font-size: 13px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

.rm-time-input {
  width: 54px; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; font-family: 'Courier Prime', monospace; font-size: 14px;
  color: var(--text); text-align: center; padding: 3px 6px; outline: none;
  transition: border-color var(--ease); flex-shrink: 0;
}
.rm-time-input:focus { border-color: var(--accent); }

.rm-suffix {
  font-size: 13px; color: var(--muted); flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.rm-delete {
  background: none; border: none; cursor: pointer; color: var(--border);
  padding: 2px 4px; border-radius: 4px; display: flex; align-items: center;
  transition: color var(--ease); flex-shrink: 0;
}
.rm-delete:hover { color: var(--red); }
.rm-delete svg { width: 14px; height: 14px; }

.add-reminder-btn {
  display: flex; align-items: center; gap: 7px; background: none;
  border: 1.5px dashed var(--border); border-radius: 10px; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 14px;
  cursor: pointer; width: 100%; transition: border-color var(--ease), color var(--ease);
}
.add-reminder-btn:hover { border-color: var(--accent); color: var(--accent); }
.add-reminder-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ─── Voice — stacked ─────────────────────────────────────────────────────── */
.voice-stack { display: flex; flex-direction: column; gap: 10px; }

.voice-select {
  width: 100%; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 13px; padding: 8px 10px; outline: none; cursor: pointer;
  transition: border-color var(--ease);
}
.voice-select:focus { border-color: var(--accent); }

.test-voice-btn {
  width: 100%; padding: 8px 0; border-radius: 8px; border: 1.5px solid var(--accent);
  background: transparent; color: var(--accent); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background var(--ease), color var(--ease);
}
.test-voice-btn:hover,
.test-voice-btn.speaking { background: var(--accent); color: #fff; }

/* ─── Audio-unlock banner ─────────────────────────────────────────────────── */
.audio-notice {
  display: none; align-items: center; justify-content: center; gap: 8px;
  background: #FBF4E8; border: 1px solid #EAD9B8; color: #8A6D3B;
  border-radius: 10px; padding: 8px 12px; font-size: 12px; cursor: pointer;
  text-align: center;
}
.audio-notice.show { display: flex; }

/* ─── Popup mode — display only ───────────────────────────────────────────── */
body.is-popup .popout-btn,
body.is-popup .card,
body.is-popup .controls,
body.is-popup .duration-input,
body.is-popup .audio-notice { display: none !important; }
body.is-popup .next-reminder { display: block; }
body.is-popup .app { padding: 32px 20px 40px; gap: 18px; }
body.is-popup .header { justify-content: center; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <span class="app-title">Timer</span>
    <button class="popout-btn" id="popout-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="1" y="4" width="10" height="10" rx="1.5"/>
        <path d="M7 1h8v8M9 7l6-6"/>
      </svg>
      Pop out
    </button>
  </div>

  <div class="hero">
    <div class="countdown" id="countdown" style="display:none">00:00</div>
    <div class="duration-input" id="dur-input">
      <input class="dur-field" id="dur-h" type="number" min="0" max="23" value="0"  tabindex="1" aria-label="Hours">
      <span class="dur-sep">:</span>
      <input class="dur-field" id="dur-m" type="number" min="0" max="59" value="15" tabindex="2" aria-label="Minutes">
      <span class="dur-sep">:</span>
      <input class="dur-field" id="dur-s" type="number" min="0" max="59" value="0"  tabindex="3" aria-label="Seconds">
    </div>
    <div class="hint" id="hint"></div>
    <div class="next-reminder" id="next-reminder">No upcoming reminders</div>
  </div>

  <div class="controls">
    <button class="btn"           id="btn-start">Start</button>
    <button class="btn btn-muted" id="btn-pause" style="display:none">Pause</button>
    <button class="btn btn-muted" id="btn-reset">Reset</button>
  </div>

  <div class="audio-notice" id="audio-notice">🔊 Click anywhere once to enable voice</div>

  <div class="card">
    <div class="section-label">Voice reminders</div>
    <div id="reminders"></div>
    <button class="add-reminder-btn" id="add-reminder">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
      </svg>
      Add reminder
    </button>
  </div>

  <div class="card">
    <div class="section-label">Voice</div>
    <div class="voice-stack">
      <select class="voice-select" id="voice-select">
        <option value="">Default voice</option>
      </select>
      <button class="test-voice-btn" id="test-voice-btn">Test voice</button>
    </div>
  </div>

</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════════════
//  This app uses a TIMESTAMP-DRIVEN clock (not a counting setInterval), so the
//  countdown never drifts and self-corrects after the tab is throttled/asleep.
//  State lives in localStorage and is shared across windows via BroadcastChannel,
//  so the pop-out window mirrors the main window instead of running a 2nd timer.
// ════════════════════════════════════════════════════════════════════════════

const IS_POPUP = new URLSearchParams(location.search).has('popup');

// ─── Keys ─────────────────────────────────────────────────────────────────────
const K_STATE  = 'timer_state';      // run state (shared, authoritative)
const K_REM    = 'timer_reminders';  // reminder list
const K_CONFIG = 'timer_config';     // duration fields + selected voice

// ─── In-memory state ──────────────────────────────────────────────────────────
// status: 'idle' | 'running' | 'paused' | 'done'
let S = { status: 'idle', endTime: 0, pausedRemaining: 0, totalSeconds: 0, announced: [] };

let reminders = [
  { id: rid(), seconds: 300, enabled: true },
  { id: rid(), seconds: 120, enabled: true },
  { id: rid(), seconds: 60,  enabled: true },
  { id: rid(), seconds: 30,  enabled: true },
];

function rid() { return 'r' + Math.random().toString(36).slice(2, 9); }

// ─── Cross-window channel ─────────────────────────────────────────────────────
const bc = ('BroadcastChannel' in window) ? new BroadcastChannel('timer-sync') : null;

// ─── Elements ─────────────────────────────────────────────────────────────────
const durH         = document.getElementById('dur-h');
const durM         = document.getElementById('dur-m');
const durS         = document.getElementById('dur-s');
const durInput     = document.getElementById('dur-input');
const countdownEl  = document.getElementById('countdown');
const hintEl       = document.getElementById('hint');
const nextRemEl    = document.getElementById('next-reminder');
const btnStart     = document.getElementById('btn-start');
const btnPause     = document.getElementById('btn-pause');
const btnReset     = document.getElementById('btn-reset');
const remContainer = document.getElementById('reminders');
const addBtn       = document.getElementById('add-reminder');
const voiceSelect  = document.getElementById('voice-select');
const testVoiceBtn = document.getElementById('test-voice-btn');
const audioNotice  = document.getElementById('audio-notice');

// ─── Persistence ──────────────────────────────────────────────────────────────
function persistState(broadcast = true) {
  try { localStorage.setItem(K_STATE, JSON.stringify(S)); } catch {}
  if (broadcast && bc) bc.postMessage({ type: 'state' });
}
function persistConfig() {
  try {
    localStorage.setItem(K_CONFIG, JSON.stringify({
      h: durH.value, m: durM.value, s: durS.value, voice: voiceSelect.value,
    }));
    localStorage.setItem(K_REM, JSON.stringify(reminders));
  } catch {}
  if (bc) bc.postMessage({ type: 'config' });
}

function loadState() {
  try {
    const raw = localStorage.getItem(K_STATE);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        S = Object.assign({ status: 'idle', endTime: 0, pausedRemaining: 0, totalSeconds: 0, announced: [] }, parsed);
        if (!Array.isArray(S.announced)) S.announced = [];
      }
    }
  } catch {}
}
function loadConfig() {
  try {
    const cfg = JSON.parse(localStorage.getItem(K_CONFIG) || '{}');
    if (cfg.h != null) durH.value = cfg.h;
    if (cfg.m != null) durM.value = cfg.m;
    if (cfg.s != null) durS.value = cfg.s;
    if (cfg.voice != null) voiceSelect.dataset.want = cfg.voice;
    const rm = JSON.parse(localStorage.getItem(K_REM) || 'null');
    if (Array.isArray(rm) && rm.length) {
      reminders = rm.map(r => ({ id: r.id || rid(), seconds: +r.seconds || 0, enabled: r.enabled !== false }));
    }
  } catch {}
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function padTwo(n) { return String(n).padStart(2, '0'); }

function capField(el) {
  el.value = padTwo(Math.max(0, Math.min(parseInt(el.value, 10) || 0, parseInt(el.max, 10))));
}
function configuredSeconds() {
  return (parseInt(durH.value, 10) || 0) * 3600
       + (parseInt(durM.value, 10) || 0) * 60
       + (parseInt(durS.value, 10) || 0);
}
function toMMSS(secs) { return `${padTwo(Math.floor(secs / 60))}:${padTwo(secs % 60)}`; }

function formatClock(secs, total) {
  const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
  return total >= 3600 ? `${padTwo(h)}:${padTwo(m)}:${padTwo(s)}` : `${padTwo(m)}:${padTwo(s)}`;
}

/** Live remaining seconds, derived from the timestamp (never drifts). */
function computeRemaining() {
  if (S.status === 'running') return Math.max(0, Math.round((S.endTime - Date.now()) / 1000));
  if (S.status === 'paused')  return S.pausedRemaining;
  return 0;
}

function announceLabel(secs) {
  if (secs >= 60) {
    const m = Math.floor(secs / 60), s = secs % 60;
    if (s === 0) return `${m} minute${m !== 1 ? 's' : ''} remaining`;
    return `${m} minute${m !== 1 ? 's' : ''} and ${s} second${s !== 1 ? 's' : ''} remaining`;
  }
  return `${secs} second${secs !== 1 ? 's' : ''} remaining`;
}

function parseTime(str) {
  str = String(str).trim();
  if (str.includes(':')) {
    const [m, s] = str.split(':');
    return Math.max(0, (parseInt(m, 10) || 0) * 60 + (parseInt(s, 10) || 0));
  }
  return Math.max(0, (parseInt(str, 10) || 0) * 60); // plain number = minutes
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const remaining = computeRemaining();
  const total     = S.totalSeconds > 0 ? S.totalSeconds : configuredSeconds();
  const active    = S.status !== 'idle';

  // Countdown vs editable inputs. Popup is always display-only.
  const showClock = IS_POPUP || active;
  durInput.style.display    = showClock ? 'none' : 'flex';
  countdownEl.style.display = showClock ? 'block' : 'none';

  if (showClock) {
    const shown = active ? remaining : configuredSeconds();
    countdownEl.textContent = formatClock(shown, Math.max(total, configuredSeconds()));
    countdownEl.classList.remove('amber', 'red');
    if (active) {
      if      (remaining <= 30)  countdownEl.classList.add('red');
      else if (remaining <= 120) countdownEl.classList.add('amber');
    }
  }

  // Buttons
  if (S.status === 'running') {
    btnStart.style.display = 'none';
    btnPause.style.display = 'inline-block';
  } else {
    btnStart.style.display = 'inline-block';
    btnPause.style.display = 'none';
    btnStart.textContent = S.status === 'paused' ? 'Resume' : 'Start';
    btnStart.disabled = (S.status === 'idle') && configuredSeconds() === 0;
  }

  // Hint
  if (S.status === 'idle') {
    hintEl.textContent = configuredSeconds() === 0 ? 'Set a duration to begin' : '';
  } else if (S.status === 'done') {
    hintEl.textContent = 'Time’s up';
  } else {
    hintEl.textContent = '';
  }

  updateNextReminder(remaining);
  validateReminders(total);
}

function updateNextReminder(remaining) {
  if (S.status === 'done') { nextRemEl.textContent = 'Timer complete'; return; }
  const total = S.totalSeconds > 0 ? S.totalSeconds : configuredSeconds();
  const upcoming = reminders
    .filter(rm => rm.enabled && rm.seconds < total && !S.announced.includes(rm.seconds)
                  && (S.status === 'idle' ? true : rm.seconds <= remaining))
    .sort((a, b) => b.seconds - a.seconds)[0];
  if (upcoming) {
    nextRemEl.innerHTML = `Next reminder at <span>${toMMSS(upcoming.seconds)}</span>`;
  } else {
    nextRemEl.textContent = 'No upcoming reminders';
  }
}

function validateReminders(total) {
  remContainer.querySelectorAll('.reminder-row').forEach((row) => {
    const id = row.dataset.id;
    const rm = reminders.find(r => r.id === id);
    row.classList.toggle('invalid', total > 0 && rm && rm.seconds >= total);
  });
}

// ─── Reminder list rendering ──────────────────────────────────────────────────
function renderReminders() {
  remContainer.innerHTML = '';
  reminders.forEach((rm) => {
    const row = document.createElement('div');
    row.className = 'reminder-row';
    row.dataset.id = rm.id;

    const check = document.createElement('input');
    check.type = 'checkbox'; check.className = 'rm-check'; check.checked = rm.enabled;
    check.addEventListener('change', () => {
      rm.enabled = check.checked; persistConfig(); render();
    });

    const prefix = document.createElement('span');
    prefix.className = 'rm-prefix'; prefix.textContent = 'at';

    const timeInput = document.createElement('input');
    timeInput.type = 'text'; timeInput.className = 'rm-time-input';
    timeInput.value = toMMSS(rm.seconds);
    timeInput.setAttribute('aria-label', 'Reminder time (MM:SS)');
    timeInput.addEventListener('focus', () => timeInput.select());
    timeInput.addEventListener('keydown', e => { if (e.key === 'Enter') timeInput.blur(); });
    timeInput.addEventListener('blur', () => {
      rm.seconds = Math.min(parseTime(timeInput.value), 86399);
      timeInput.value = toMMSS(rm.seconds);
      suffix.textContent = '— ' + announceLabel(rm.seconds);
      persistConfig(); render();
    });

    const suffix = document.createElement('span');
    suffix.className = 'rm-suffix';
    suffix.textContent = '— ' + announceLabel(rm.seconds);

    const del = document.createElement('button');
    del.className = 'rm-delete'; del.title = 'Remove';
    del.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>`;
    del.addEventListener('click', () => {
      reminders = reminders.filter(r => r.id !== rm.id);
      renderReminders(); persistConfig(); render();
    });

    row.append(check, prefix, timeInput, suffix, del);
    remContainer.appendChild(row);
  });
}

addBtn.addEventListener('click', () => {
  const base = S.totalSeconds > 0 ? S.totalSeconds : configuredSeconds();
  reminders.push({ id: rid(), seconds: base > 0 ? Math.floor(base / 2) : 60, enabled: true });
  renderReminders(); persistConfig(); render();
  const inputs = remContainer.querySelectorAll('.rm-time-input');
  inputs[inputs.length - 1]?.focus();
});

// ─── Duration inputs ──────────────────────────────────────────────────────────
[durH, durM, durS].forEach(el => {
  el.addEventListener('focus', () => el.select());
  el.addEventListener('blur',  () => { capField(el); persistConfig(); render(); });
  el.addEventListener('input', () => { if (S.status === 'idle') render(); });
});
durH.addEventListener('keydown', e => { if (e.key === 'Tab' && !e.shiftKey) { e.preventDefault(); durM.focus(); } });
durM.addEventListener('keydown', e => { if (e.key === 'Tab' && !e.shiftKey) { e.preventDefault(); durS.focus(); } });

// ─── Controls ─────────────────────────────────────────────────────────────────
function start() {
  unlockAudio();
  if (S.status === 'idle' || S.status === 'done') {
    const total = configuredSeconds();
    if (total === 0) return;
    S.totalSeconds = total;
    S.endTime = Date.now() + total * 1000;
    S.announced = [];
  } else if (S.status === 'paused') {
    S.endTime = Date.now() + S.pausedRemaining * 1000;
  }
  S.status = 'running';
  persistState(); render();
}
function pause() {
  if (S.status !== 'running') return;
  S.pausedRemaining = computeRemaining();
  S.status = 'paused';
  persistState(); render();
}
function reset() {
  speechSynthesis.cancel();
  S = { status: 'idle', endTime: 0, pausedRemaining: 0, totalSeconds: 0, announced: [] };
  persistState(); render();
}
btnStart.addEventListener('click', () => { if (S.status === 'paused' || S.status === 'idle' || S.status === 'done') start(); });
btnPause.addEventListener('click', pause);
btnReset.addEventListener('click', reset);

// ─── The clock loop (250ms — responsive, self-correcting) ─────────────────────
function loop() {
  if (S.status === 'running') {
    const remaining = computeRemaining();

    // Fire any thresholds we've reached. Claim across windows so only ONE speaks.
    reminders.forEach(rm => {
      if (rm.enabled && rm.seconds < S.totalSeconds && remaining <= rm.seconds
          && !S.announced.includes(rm.seconds)) {
        const fresh = (rm.seconds - remaining) <= 3; // skip stale ones after a long sleep
        if (claim(rm.seconds) && fresh) speak(announceLabel(rm.seconds));
      }
    });

    if (remaining <= 0) {
      S.status = 'done';
      persistState();
      if (claim('__alarm__')) fireAlarm();
    }
    render();
  }
}
setInterval(loop, 250);

/**
 * Atomically claim a milestone using localStorage as the shared ledger, so that
 * when both the main window and the popup are open, only one announces.
 * Returns true if THIS window won the claim.
 */
function claim(threshold) {
  let latest = S;
  try {
    const raw = localStorage.getItem(K_STATE);
    if (raw) latest = JSON.parse(raw);
  } catch {}
  if (!Array.isArray(latest.announced)) latest.announced = [];
  if (latest.announced.includes(threshold)) { S.announced = latest.announced; return false; }
  latest.announced.push(threshold);
  S = Object.assign(S, latest);
  persistState();
  return true;
}

// ─── Speech ───────────────────────────────────────────────────────────────────
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  audioNotice.classList.remove('show');
  try { speechSynthesis.resume(); } catch {}
  // Prime an AudioContext within the user gesture so the final alarm can play.
  try { window._actx = window._actx || new (window.AudioContext || window.webkitAudioContext)(); window._actx.resume(); } catch {}
}
document.addEventListener('pointerdown', unlockAudio, { once: false });
if (!IS_POPUP) audioNotice.classList.add('show');

function populateVoices() {
  const want = voiceSelect.value || voiceSelect.dataset.want || '';
  voiceSelect.innerHTML = '<option value="">Default voice</option>';
  speechSynthesis.getVoices().forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name; opt.textContent = `${v.name} (${v.lang})`;
    voiceSelect.appendChild(opt);
  });
  if (want && [...voiceSelect.options].some(o => o.value === want)) voiceSelect.value = want;
}
speechSynthesis.addEventListener('voiceschanged', populateVoices);
voiceSelect.addEventListener('change', persistConfig);

function speak(text, onDone) {
  const ss = window.speechSynthesis;
  try { ss.resume(); ss.cancel(); } catch {}
  setTimeout(() => {
    const utt  = new SpeechSynthesisUtterance(text);
    utt.rate = 0.95; utt.pitch = 1; utt.volume = 1;
    const name = voiceSelect.value;
    if (name) {
      const voice = ss.getVoices().find(v => v.name === name);
      if (voice) { utt.voice = voice; utt.lang = voice.lang; }
    }
    utt.onend = utt.onerror = () => onDone && onDone();
    ss.speak(utt);
  }, 50);
}

testVoiceBtn.addEventListener('click', () => {
  unlockAudio();
  testVoiceBtn.textContent = 'Speaking…';
  testVoiceBtn.classList.add('speaking');
  speak('5 minutes remaining', () => {
    testVoiceBtn.textContent = 'Test voice';
    testVoiceBtn.classList.remove('speaking');
  });
});

function fireAlarm() {
  try {
    const ctx = window._actx || new (window.AudioContext || window.webkitAudioContext)();
    ctx.resume();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 528;
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2);
    osc.start(); osc.stop(ctx.currentTime + 2);
  } catch {}
}

// ─── Pop-out + cross-window sync ──────────────────────────────────────────────
if (IS_POPUP) {
  document.body.classList.add('is-popup');
} else {
  document.getElementById('popout-btn').addEventListener('click', () => {
    const w = 360, h = 300;
    const left = Math.round(screen.width / 2 - w / 2);
    const top  = Math.round(screen.height / 2 - h / 2);
    window.open(location.pathname + '?popup=1', 'timer-popup',
      `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=no,toolbar=no,menubar=no`);
  });
}

function pullShared(which) {
  if (which === 'config') { loadConfig(); renderReminders(); }
  loadState();
  render();
}
if (bc) bc.onmessage = (e) => pullShared(e.data && e.data.type);
window.addEventListener('storage', (e) => {
  if (e.key === K_STATE)  { loadState(); render(); }
  if (e.key === K_REM || e.key === K_CONFIG) { loadConfig(); renderReminders(); render(); }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadConfig();
loadState();
populateVoices();
renderReminders();
render();
</script>
</body>
</html>
